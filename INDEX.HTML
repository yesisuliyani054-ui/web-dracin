<!DOCTYPE html>
<html>
<head>
<title>KSANF</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
background:#0b0f1a;
font-family:sans-serif;
color:white;
}

/* HERO */
.hero{
padding:20px;
background:linear-gradient(135deg,#111827,#1f2937);
border-bottom-left-radius:20px;
border-bottom-right-radius:20px;
}

.hero h1{margin:0;font-size:22px}
.hero p{opacity:0.7;font-size:13px}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.card{
background:rgba(255,255,255,0.05);
border-radius:12px;
overflow:hidden;
transition:0.3s;
}

.card:hover{transform:scale(1.03)}

.card img{
width:100%;
height:120px;
object-fit:cover;
}

.card h4{
font-size:13px;
margin:8px;
}

/* VIDEO */
video{
width:100%;
}

/* BOTTOM NAV */
.nav{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-around;
background:#0f172a;
padding:10px;
border-top:1px solid rgba(255,255,255,0.1);
font-size:12px;
}
</style>
</head>

<body>

<div class="hero">
<h1>🎬 KSANF STREAM</h1>
<p>Dracin & Movie Premium</p>
</div>

<div class="grid" id="videos"></div>

<div class="nav">
<div>Home</div>
<div>Search</div>
<div>VIP</div>
<div>Profile</div>
</div>

<script>
fetch("/videos")
.then(r=>r.json())
.then(data=>{
let html=""
data.forEach(v=>{
html+=`
<div class="card">
<img src="${v.thumbnail}">
<h4>${v.title}</h4>
<video controls src="${v.url}"></video>
</div>
`
})
document.getElementById("videos").innerHTML=html
})
</script>

</body>
</html>
